<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityOS-2035 Operational Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-color: #050a15;
      --panel-bg: rgba(13, 22, 45, 0.65);
      --border-glow: #00f0ff;
      --text-primary: #e0fbfc;
      --text-secondary: #98c1d9;
      --accent-cyan: #00f0ff;
      --accent-pink: #f20089;
      --accent-warning: #ffb703;
      --accent-danger: #d90429;
      --accent-success: #06d6a0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(242, 0, 137, 0.08), transparent 40%);
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    header {
      border-bottom: 1px solid rgba(0, 240, 255, 0.2);
      padding-bottom: 2.5rem;
      margin-bottom: 4rem;
      text-align: center;
      animation: fadeInDown 1s ease-out;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 2px;
      background: var(--accent-cyan);
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    h1 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 4rem;
      margin: 0;
      color: var(--text-primary);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
      letter-spacing: 3px;
    }

    h1 span {
      color: var(--accent-cyan);
    }

    h2 {
      font-weight: 300;
      color: var(--text-secondary);
      font-size: 1.2rem;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 5px;
    }

    .status-bar {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      margin-top: 2rem;
      font-family: 'Share Tech Mono', monospace;
      background: var(--panel-bg);
      padding: 1rem 2.5rem;
      border-radius: 50px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      background-color: var(--accent-success);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--accent-success);
      animation: pulse 2s infinite;
    }

    .firebase-status {
      color: var(--accent-warning);
      font-weight: bold;
      font-size: 0.9rem;
    }

    .timeline {
      position: relative;
      max-width: 1000px;
      margin: 0 auto;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--accent-cyan), var(--accent-pink), var(--accent-cyan), transparent);
      transform: translateX(-50%);
      opacity: 0.5;
    }

    .log-entry {
      position: relative;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 4rem;
      width: 100%;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .log-entry:nth-child(even) {
      justify-content: flex-start;
    }

    .node {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background: var(--bg-color);
      border: 2px solid var(--accent-cyan);
      border-radius: 50%;
      z-index: 2;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
      transition: all 0.3s ease;
    }

    .log-entry:hover .node {
      background: var(--accent-cyan);
      box-shadow: 0 0 25px rgba(0, 240, 255, 1);
      transform: translateX(-50%) scale(1.3);
    }

    .log-panel {
      width: 45%;
      background: var(--panel-bg);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .log-entry:nth-child(odd) .log-panel {
      border-left: 3px solid var(--accent-cyan);
      text-align: left;
    }

    .log-entry:nth-child(even) .log-panel {
      border-right: 3px solid var(--accent-cyan);
      text-align: right;
    }

    .log-panel:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 240, 255, 0.4);
    }

    .time-stamp {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      color: var(--accent-cyan);
      display: block;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
      margin-bottom: 0.5rem;
    }

    .chaos-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--accent-pink);
      font-weight: bold;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .metric-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 4px;
    }

    .metric-value {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent-cyan);
    }

    .decision-block {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
      font-weight: 300;
    }

    .decision-block strong {
      color: var(--text-primary);
      font-weight: 600;
      display: block;
      margin-top: 10px;
    }

    .status-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      display: inline-block;
      padding: 0.5rem 1rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
    }

    .status-Stable {
      color: var(--accent-success);
      border-left: 2px solid var(--accent-success);
    }

    .status-Adapting {
      color: var(--accent-warning);
      border-left: 2px solid var(--accent-warning);
    }

    .status-Critical {
      color: var(--accent-danger);
      border-left: 2px solid var(--accent-danger);
    }

    .anomaly-block {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid var(--accent-danger);
      background: rgba(217, 4, 41, 0.1);
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: left;
    }

    .anomaly-item strong {
      color: var(--accent-pink);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(6, 214, 160, 0.7);
      }

      70% {
        box-shadow: 0 0 0 15px rgba(6, 214, 160, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(6, 214, 160, 0);
      }
    }

    @media (max-width: 900px) {
      .timeline::before {
        left: 30px;
      }

      .node {
        left: 30px;
      }

      .log-panel {
        width: calc(100% - 70px);
      }

      .log-entry {
        justify-content: flex-end !important;
      }

      .log-entry:nth-child(even) .log-panel,
      .log-entry:nth-child(odd) .log-panel {
        text-align: left;
        border-left: 3px solid var(--accent-cyan);
        border-right: none;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard-container">
    <header class="dashboard-header">
      <h1>City<span>OS</span>-2035</h1>
      <h2>Global Neural Simulation Engine</h2>
      <div class="status-bar">
        <span style="display:flex; align-items:center; gap:10px;">
          <span class="status-indicator"></span>
          SYSTEM ONLINE: VENUE OVERSIGHT
        </span>
        <span class="firebase-status" id="db-status">DATA LOG: FIREBASE STANDBY</span>
      </div>
    </header>

    <main class="timeline" id="timeline-container"></main>
  </div>

  <!-- Firebase SDK Implementation Placeholder -->

    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    window.simulateFirebasePush = async (eventData) => {
      const statusEl = document.getElementById('db-status');
      statusEl.innerText = "DATA LOG: PUSHING TO FIRESTORE...";
      statusEl.style.color = "var(--accent-cyan)";

      // Artificial latency to simulate cloud push
      setTimeout(() => {
        statusEl.innerText = "DATA LOG: FIRESTORE SYNCED (LOCAL MOCK)";
        statusEl.style.color = "var(--accent-success)";
        if (db && Object.keys(firebaseConfig).length > 2) {
          // Real DB writing logic goes here
          // addDoc(collection(db, "cityos_logs"), eventData);
        }
      }, 800);
    };
  </script>

  <script src="simulation_logic.js"></script>
  <script>
    async function loadData() {
      const container = document.getElementById('timeline-container');
      let entries = [];

      try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Fetch failed');
        entries = await response.json();
      } catch (error) {
        console.warn("Local fetch failed (likely CORS). Using embedded fallback data.", error);
        entries = [
            {
                "time": "08:00", "chaos_index": 20,
                "chaos_metrics": { "traffic": 15, "weather": 5, "energy": 40, "health": 10 },
                "decision": { "cause": "Morning pre-event routines.", "action_taken": "Initiating hyper-cooling cycle.", "expected_impact": "Stabilize temperatures." },
                "prediction": 18, "before_vs_after": { "before": 20, "after": 18 }, "system_status": "Stable", "anomaly": null
            },
            {
                "time": "14:10", "chaos_index": 88,
                "chaos_metrics": { "traffic": 85, "weather": 100, "energy": 70, "health": 90 },
                "decision": { "cause": "Localized micro-burst.", "action_taken": "Immediate isolation. AR emergency routes.", "expected_impact": "Prevent electrocution." },
                "prediction": 65, "before_vs_after": { "before": 88, "after": 65 }, "system_status": "Critical",
                "anomaly": { "type": "Black Swan Event", "impact": "Inbound trains flooded.", "ai_response": "Protocol Umbrella-9.", "recovery_result": "Stabilized in 12 min." }
            }
        ];
      }

      // Trigger logic parsing
      entries.forEach(e => processEventData(e));
      checkGlobalChaos(entries);

      entries.forEach((entry, index) => {
        const entryEl = document.createElement('div');
        entryEl.className = 'log-entry';
        entryEl.style.animationDelay = `${index * 0.15}s`;

        // Anomaly HTML block
        let anomalyHtml = "";
        if (entry.anomaly) {
          anomalyHtml = `
                    <div class="anomaly-block">
                        <div class="anomaly-item"><strong>[ANOMALY TYPE]</strong> ${entry.anomaly.type}</div>
                        <div class="anomaly-item"><strong>[IMPACT]</strong> ${entry.anomaly.impact}</div>
                        <div class="anomaly-item"><strong>[AI RESPONSE]</strong> ${entry.anomaly.ai_response}</div>
                        <div class="anomaly-item"><strong>[RECOVERY]</strong> ${entry.anomaly.recovery_result}</div>
                    </div>
                  `;
        }

        entryEl.innerHTML = `
                  <div class="node"></div>
                  <div class="log-panel">
                      <span class="time-stamp">${entry.time}</span>
                      <div class="chaos-header">CHAOS INDEX: ${entry.chaos_index.toFixed(1)}%</div>
                      
                      <div class="metrics-grid">
                          <div class="metric-item"><span>Traffic (30%)</span><span class="metric-value">+${((entry.chaos_metrics.traffic || 0) * 0.3).toFixed(1)}</span></div>
                          <div class="metric-item"><span>Weather (25%)</span><span class="metric-value">+${((entry.chaos_metrics.weather || 0) * 0.25).toFixed(1)}</span></div>
                          <div class="metric-item"><span>Energy (20%)</span><span class="metric-value">+${((entry.chaos_metrics.energy || 0) * 0.2).toFixed(1)}</span></div>
                          <div class="metric-item"><span>Health (25%)</span><span class="metric-value">+${((entry.chaos_metrics.health || 0) * 0.25).toFixed(1)}</span></div>
                      </div>

                      <div class="decision-block">
                          <strong>Cause:</strong> ${entry.decision.cause}
                          <strong>AI Action:</strong> ${entry.decision.action_taken}
                          <strong>Expected Impact:</strong> ${entry.decision.expected_impact}
                      </div>

                      <div style="font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; margin-bottom: 1rem; color: var(--text-secondary);">
                          <div>PREDICTION (10 MIN): <span style="color:var(--accent-success)">${entry.prediction.toFixed(1)}%</span></div>
                          <div>BEFORE vs AFTER: ${entry.before_vs_after.before}% &rarr; ${entry.before_vs_after.after}%</div>
                      </div>

                      <div class="status-badge status-${entry.system_status}">
                          STATUS: ${entry.system_status}
                      </div>

                      ${anomalyHtml}
                  </div>
              `;
        container.appendChild(entryEl);

        // Simulate staggered Firebase upload
        setTimeout(() => {
          if (window.simulateFirebasePush) {
            window.simulateFirebasePush(entry);
          }
        }, 1500 + (index * 2000));
      });
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
<script src="simulation_logic.js"></script>

</body>

</html>
